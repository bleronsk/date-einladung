<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eine kleine Einladung ❤️</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      color: #3d1f2b;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
      position: relative;
      z-index: 2;
      animation: pop 0.7s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .hidden {
      display: none;
    }

    .heart {
      font-size: 3rem;
      margin-bottom: 12px;
      animation: beat 1.2s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    h1, h2 {
      margin-bottom: 16px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    button {
      border: none;
      background: #d6336c;
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      margin: 8px;
      box-shadow: 0 8px 18px rgba(214, 51, 108, 0.35);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #b92759;
    }

    .secondary {
      background: #ff85a1;
    }

    .date-box {
      background: #fff4f7;
      border-radius: 18px;
      padding: 18px;
      margin: 18px 0;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #ffc2d1;
      font-size: 1rem;
    }

    textarea {
      min-height: 90px;
      resize: none;
    }

    .floating-heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.75);
      font-size: 24px;
      animation: float 7s linear infinite;
      z-index: 1;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card" id="page1">
    <div class="heart">❤️</div>
    <h1>Hallo Schnucki</h1>
    <p>Willst du mit mir auf ein Date gehen?</p>
    <button onclick="showPage(2)">Yehaw ❤️</button>
    <button class="secondary" onclick="showPage(2)">Natürlich ja ❤️</button>
  </div>

  <div class="card hidden" id="page2">
    <div class="heart">💌</div>
    <h2>Offizielle Einladung</h2>
    <p>Dann darfst du jetzt aussuchen, wann und worauf du Lust hast.</p>

    <div class="date-box">
      <label><strong>📅 Such dir ein Datum aus:</strong></label>
      <input type="date" id="chosenDate">

      <label><strong>🕒 Such dir eine Uhrzeit aus:</strong></label>
      <input type="time" id="chosenTime">

      <label><strong>🍽️ Worauf hast du Lust zu essen?</strong></label>
      <textarea id="foodWish" placeholder="Pizza, Sushi, Burger, Italienisch..."></textarea>
    </div>

    <button onclick="showSummary()">Antwort abschicken ❤️</button>
  </div>

  <div class="card hidden" id="page2">
  <div class="heart">💌</div>

  <h2>Date ❤️</h2>


  <form action="https://formspree.io/f/xzdqyozb" method="POST">

    <div class="date-box">

      <label>📅 Datum</label>
      <input
        type="date"
        name="Datum"
        required
      >

      <label>🕒 Uhrzeit</label>
      <input
        type="time"
        name="Uhrzeit"
        required
      >

      <label>🍽️ Worauf hast du Lust?</label>
      <textarea
        name="Essenswunsch"
        placeholder="Sushi, Italienisch, Burger..."
        required
      ></textarea>

      <input
        type="hidden"
        name="_subject"
        value="Neue Date-Antwort ❤️"
      >

    </div>

    <button type="submit">
      Antwort senden ❤️
    </button>

  </form>
</div>

  <script>
    function showPage(number) {
      document.querySelectorAll(".card").forEach(card => card.classList.add("hidden"));
      document.getElementById("page" + number).classList.remove("hidden");
    }

    function showSummary() {
      const date = document.getElementById("chosenDate").value;
      const time = document.getElementById("chosenTime").value;
      const food = document.getElementById("foodWish").value;

      if (!date || !time || !food) {
        alert("Bitte füll alles aus ❤️");
        return;
      }

      document.getElementById("resultDate").innerText = date;
      document.getElementById("resultTime").innerText = time;
      document.getElementById("resultFood").innerText = food;

      showPage(3);
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("floating-heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
      heart.style.fontSize = (Math.random() * 18 + 16) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createHeart, 500);
  </script>

</body>
</html>
